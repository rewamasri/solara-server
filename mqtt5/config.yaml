# config.yaml - MQTT subscriber configuration

broker:
  host: "localhost"
  ip: "0.0.0.0"
  port: 1883
  client_id: "subscriber-server-001"
  clean_session: true
  keepalive: 60

topics:
  ML:     "sensors/ML"
  ESRI:   "sensors/ESRI"
  status: "sensors/status"

subscriber:
  data_dir: "data"
  qos: 1

api:
  url: "http://192.168.x.x:8000/sensors"  # database team's endpoint - FastAPI URL 