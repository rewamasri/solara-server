# config.yaml - MQTT subscriber configuration

broker:
  host: "mos1"
  ip: "0.0.0.0"
  port: 1883
  client_id: "subscriber-server-001"
  clean_session: true
  keepalive: 60

topics:
  environment: "sensors/environment"
  light:       "sensors/light"
  thermal:     "sensors/thermal"
  all:         "sensors/all"
  status:      "sensors/status"

subscriber:
  qos: 1