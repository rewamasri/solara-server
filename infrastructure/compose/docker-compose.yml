# define containers
version: "3.9"

services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ../../config/mosquitto.conf:/mosquitto/config/mosquitto.conf

  db:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: azure-sql-edge
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: fastapi-service
    depends_on:
      - mosquitto
      - db
    ports:
      - "8000:8000"

volumes:
  sql_data:

dashboard-sync:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.dashboard
    container_name: dashboard-sync
    depends_on:
      - db
    environment:
      - SA_PASSWORD=YourStrongPassword123!
      - ARCGIS_CLIENT_ID=0oLLJvxhKAMdcWTW
      - ARCGIS_CLIENT_SECRET=ae6c72208adf4bb38d1af2d36cb6da91
    restart: unless-stopped